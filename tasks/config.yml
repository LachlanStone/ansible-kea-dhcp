---
- name: config | Configuring Kea DHCP
  ansible.builtin.template:
    src: "{{ item + '.j2' }}"
    dest: "{{ '/' + item }}"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Restart kea-dhcp
  become: true
  loop:
    - etc/kea/kea-dhcp-ddns.conf
    - etc/kea/kea-dhcp4.conf
    - etc/kea/keactrl.conf

- name: config | Configuring Kea DHCPv6
  ansible.builtin.template:
    src: etc/kea/kea-dhcp6.conf.j2
    dest: /etc/kea/kea-dhcp6.conf
    owner: root
    group: root
    mode: "0644"
  notify:
    - Restart kea-dhcp
  become: true
  when: kea_dhcp_service_state['ipv6'] | bool
